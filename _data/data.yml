career-profile:
    title: Career Profile
    summary: |
      I'm currently pursuing a PhD in the Hydrologic Sciences & Engineering program within the Department of Civil & Environmental Engineering at Colorado State University. My <a href='https://fdavenport.github.io/research/evaluating-drivers-extreme-runoff/' target='_blank'>research interests</a> span the intersections between climate change, hydrology, flood mitigation, and data science.

      I received my Bachelor of Biosystems and Agricultural Engineering (BBAE) degree from the University of Minnesota in 2009, then worked as a water resources engineering consultant while pursuing a Master of Science (MS) degree at the University of Minnesota, which I received in 2019.

